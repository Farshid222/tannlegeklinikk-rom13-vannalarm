<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tannlegeklinikk Rom 13 Vannalarm</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 40px;
    }

    .card {
      max-width: 900px;
      margin: 0 auto;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 28px;
    }

    h1 {
      margin-top: 0;
    }

    pre {
      background: #020617;
      color: #dbeafe;
      padding: 18px;
      border-radius: 16px;
      overflow: auto;
    }

    .ok {
      color: #34d399;
      font-weight: bold;
    }

    .alarm {
      color: #fb7185;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Tannlegeklinikk Rom 13 - Vannalarm</h1>
    <p>Status: <span id="status">Laster...</span></p>
    <p>Alarm: <span id="alarm">--</span></p>

    <h2>Rå data fra latest.json</h2>
    <pre id="raw">Laster...</pre>
  </div>

  <script>
    const LATEST_URL = "https://raw.githubusercontent.com/Farshid222/tannlegeklinikk-rom13-vannalarm/main/data/latest.json";

    async function loadData() {
      try {
        const response = await fetch(LATEST_URL + "?v=" + Date.now(), {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();

        document.getElementById("status").textContent = "Data hentet";
        document.getElementById("status").className = "ok";

        const alarm = Boolean(data.alarm_active || data.any_water_detected);
        document.getElementById("alarm").textContent = alarm ? "LEKKASJE / ALARM" : "Ingen alarm";
        document.getElementById("alarm").className = alarm ? "alarm" : "ok";

        document.getElementById("raw").textContent = JSON.stringify(data, null, 2);

      } catch (error) {
        document.getElementById("status").textContent = "Feil ved henting";
        document.getElementById("status").className = "alarm";
        document.getElementById("raw").textContent = String(error);
      }
    }

    loadData();
    setInterval(loadData, 30000);
  </script>
</body>
</html>
